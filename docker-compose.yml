services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: open-reliability-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_reliability
      POSTGRES_USER: open_reliability
      POSTGRES_PASSWORD: open_reliability
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U open_reliability -d open_reliability",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: